name: CI

on:
  pull_request:
  push:
    branches:
      - main
    paths-ignore:
      - deploy/helm/sprintboard/values-prod.yaml

permissions:
  contents: read

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install developer tooling
        run: python -m pip install -r requirements-dev.txt

      - name: Run pre-commit hooks
        shell: bash
        run: |
          set +e
          python -m pre_commit run --all-files --show-diff-on-failure
          status=$?
          if [ "$status" -ne 0 ]; then
            echo
            echo "pre-commit failed; showing repository diff:"
            git diff -- . ':!.git' || true
            exit "$status"
          fi

      - name: Run unit tests
        run: python -m unittest discover -s tests -v

  platform:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Lint Helm chart
        run: helm lint deploy/helm/sprintboard

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false

      - name: Check Terraform formatting
        run: terraform fmt -check -recursive

      - name: Validate Terraform
        working-directory: infra/terraform
        env:
          TF_IN_AUTOMATION: "true"
        run: |
          terraform init -backend=false
          terraform validate

  docker:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs:
      - quality
      - platform
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    env:
      DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
      DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        if: ${{ env.DOCKERHUB_USERNAME != '' && env.DOCKERHUB_TOKEN != '' }}
        uses: docker/login-action@v3
        with:
          username: ${{ env.DOCKERHUB_USERNAME }}
          password: ${{ env.DOCKERHUB_TOKEN }}

      - name: Build and push image
        if: ${{ env.DOCKERHUB_USERNAME != '' && env.DOCKERHUB_TOKEN != '' }}
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.DOCKERHUB_USERNAME }}/sprintboard:${{ github.sha }}
            ${{ env.DOCKERHUB_USERNAME }}/sprintboard:latest

  notify:
    if: always() && github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs:
      - quality
      - platform
      - docker
    runs-on: ubuntu-latest
    env:
      WEBHOOK_URL: ${{ secrets.WEBHOOK_URL }}
    steps:
      - name: Send webhook notification
        if: ${{ env.WEBHOOK_URL != '' }}
        env:
          QUALITY_RESULT: ${{ needs.quality.result }}
          PLATFORM_RESULT: ${{ needs.platform.result }}
          DOCKER_RESULT: ${{ needs.docker.result }}
          SHA: ${{ github.sha }}
          REPOSITORY: ${{ github.repository }}
        run: |
          if [ "$QUALITY_RESULT" = "success" ] && [ "$PLATFORM_RESULT" = "success" ] && [ "$DOCKER_RESULT" = "success" ]; then
            COLOR=3066993
            STATUS="SUCCESS"
          else
            COLOR=15158332
            STATUS="FAILURE"
          fi
          curl -X POST "$WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            -d "{
              \"embeds\": [{
                \"title\": \"CI Pipeline: $STATUS\",
                \"color\": $COLOR,
                \"fields\": [
                  {\"name\": \"Repository\", \"value\": \"$REPOSITORY\", \"inline\": true},
                  {\"name\": \"Commit\", \"value\": \"\`${SHA:0:7}\`\", \"inline\": true},
                  {\"name\": \"Quality\", \"value\": \"$QUALITY_RESULT\", \"inline\": true},
                  {\"name\": \"Platform\", \"value\": \"$PLATFORM_RESULT\", \"inline\": true},
                  {\"name\": \"Docker\", \"value\": \"$DOCKER_RESULT\", \"inline\": true}
                ]
              }]
            }"
