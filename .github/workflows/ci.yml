name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install developer tooling
        run: pip install -r requirements-dev.txt

      - name: Run pre-commit hooks
        run: pre-commit run --all-files --show-diff-on-failure

      - name: Run unit tests
        run: python -m unittest discover -s tests -v

  docker:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: quality
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        if: ${{ secrets.DOCKERHUB_USERNAME != '' && secrets.DOCKERHUB_TOKEN != '' }}
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push image
        if: ${{ secrets.DOCKERHUB_USERNAME != '' && secrets.DOCKERHUB_TOKEN != '' }}
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/sprintboard:${{ github.sha }}
            ${{ secrets.DOCKERHUB_USERNAME }}/sprintboard:latest

  notify:
    if: always() && github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs:
      - quality
      - docker
    runs-on: ubuntu-latest
    steps:
      - name: Send webhook notification
        if: ${{ secrets.WEBHOOK_URL != '' }}
        env:
          WEBHOOK_URL: ${{ secrets.WEBHOOK_URL }}
          QUALITY_RESULT: ${{ needs.quality.result }}
          DOCKER_RESULT: ${{ needs.docker.result }}
          SHA: ${{ github.sha }}
          REPOSITORY: ${{ github.repository }}
        run: |
          curl -X POST "$WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            -d "{\"repository\":\"$REPOSITORY\",\"sha\":\"$SHA\",\"quality\":\"$QUALITY_RESULT\",\"docker\":\"$DOCKER_RESULT\"}"

