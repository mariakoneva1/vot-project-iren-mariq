name: CD

on:
  workflow_run:
    workflows: ["CI"]
    types:
      - completed

permissions:
  contents: write

jobs:
  promote:
    if: ${{ github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.head_branch == 'main' }}
    runs-on: ubuntu-latest
    env:
      DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
      WEBHOOK_URL: ${{ secrets.WEBHOOK_URL }}
    steps:
      - name: Checkout target branch
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Update production image tag
        env:
          IMAGE_REPOSITORY: ${{ env.DOCKERHUB_USERNAME }}/sprintboard
          IMAGE_TAG: ${{ github.event.workflow_run.head_sha }}
        run: |
          if [ -z "$IMAGE_REPOSITORY" ] || [[ "$IMAGE_REPOSITORY" == "/sprintboard" ]]; then
            echo "DOCKERHUB_USERNAME is not configured. Skipping manifest promotion."
            exit 0
          fi
          python scripts/update_image_tag.py deploy/helm/sprintboard/values-prod.yaml "$IMAGE_REPOSITORY" "$IMAGE_TAG"

      - name: Commit GitOps manifest update
        run: |
          if git diff --quiet -- deploy/helm/sprintboard/values-prod.yaml; then
            echo "No deployment manifest changes detected."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add deploy/helm/sprintboard/values-prod.yaml
          git commit -m "chore: promote image ${{ github.event.workflow_run.head_sha }}"
          git push origin main

      - name: Notify deployment webhook
        if: ${{ env.WEBHOOK_URL != '' }}
        env:
          SHA: ${{ github.event.workflow_run.head_sha }}
          REPOSITORY: ${{ github.repository }}
        run: |
          curl -X POST "$WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            -d "{\"repository\":\"$REPOSITORY\",\"sha\":\"$SHA\",\"status\":\"manifest-promoted\"}"
