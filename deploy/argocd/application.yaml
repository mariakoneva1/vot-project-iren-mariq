apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: sprintboard
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: sprintboard
  source:
    repoURL: https://github.com/mariakoneva1/vot-project-iren-mariq.git
    targetRevision: main
    path: deploy/helm/sprintboard
    helm:
      valueFiles:
        - values.yaml
        - values-prod.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: sprintboard
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
